server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml;

    # HTML pages — no cache (content can change on redeploy)
    location ~* \.html$ {
        add_header Cache-Control "no-cache, must-revalidate";
        try_files $uri $uri/ =404;
    }

    # Astro hashed assets (/_astro/*.css, /_astro/*.js) — cache forever
    # Astro adds content hash to filenames, so these are safe to cache immutably
    location ^~ /_astro/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Other static assets (fonts, images, icons in /public)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|webp|avif)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, no-transform";
    }

    # URL routing without .html extensions
    location / {
        try_files $uri $uri/ $uri.html =404;
    }
}
